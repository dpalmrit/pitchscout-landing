<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchScout | AI-Powered Soccer Scouting & Video Analysis< | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        /* Keep the neon-green accent from the demo site for accents */
        .text-pitch-green {
            color: #42f469;
        }
        .bg-pitch-green {
            background-color: #42f469;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-3xl w-full text-center">
        
        <div class="mb-10 flex flex-col items-center">
            <img src="logo.png" alt="Pitch Scout Logo - Soccer player with analytics graphs" class="h-48 md:h-64 object-contain">
        </div>
        
        <p class="text-gray-400 text-xl md:text-2xl mb-6 font-medium max-w-xl mx-auto leading-relaxed">
            The standard in <span class="text-pitch-green">elite soccer analysis</span> is changing. 
            The field of data is open.
        </p>

        <div class="mb-10">
            <p class="text-zinc-500 text-sm uppercase tracking-widest mb-2">Want a sneak peek?</p>
            <a href="https://demo.pitchscout.ai" target="_blank" class="text-pitch-green hover:text-[#2ccf4f] font-bold text-lg underline underline-offset-8 decoration-2 transition-all">
                Explore the Live Demo →
            </a>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-10 rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.7)]">
            <h2 class="text-3xl font-black mb-3 tracking-tight">COMING <span class="text-pitch-green">SOON</span></h2>
            <p class="text-zinc-400 mb-8 max-w-lg mx-auto">Get on the list. Sign up below for an exclusive, one-time early release discount.</p>
            
            <form action="https://formspree.io/f/mvzvjkgg" method="POST" class="flex flex-col md:flex-row gap-4 max-w-lg mx-auto">
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Parent / Coach / Club Director" 
                    required
                    class="flex-1 px-6 py-4 rounded-xl bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-[#42f469] transition-all text-white placeholder-zinc-500"
                >
                <button 
                    type="submit" 
                    class="bg-pitch-green hover:bg-[#2ccf4f] text-black font-extrabold py-4 px-10 rounded-xl transition-all transform hover:scale-105 uppercase tracking-wide whitespace-nowrap"
                >
                    Get An Early Discount
                </button>
            </form>
        </div>

        <div class="mt-16 pt-8 border-t border-zinc-900/50 flex flex-col md:flex-row items-center justify-between gap-6 text-xs text-zinc-600 uppercase tracking-[0.4em] font-bold">
            <span class="flex items-center gap-2">Elevate</span>
            <span class="flex items-center gap-2">Through</span>
            <span class="flex items-center gap-2">Data analysis</span>
        </div>
    </div>

</body>
</html>
